<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asuna ✿</title>
<link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=M+PLUS+Rounded+1c:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #f4a7c3;
    --pink-light: #fde8f0;
    --pink-deep: #e07fa0;
    --lavender: #d4b8e0;
    --cream: #fff8fb;
    --soft-white: #fffafc;
    --text: #4a3040;
    --text-light: #9a7888;
    --bubble-user: #f4a7c3;
    --bubble-asuna: #fff0f6;
    --shadow: rgba(220, 140, 170, 0.18);
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
font-family: ‘M PLUS Rounded 1c’, sans-serif;
background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 30%, #e1bee7 70%, #fce4ec 100%);
background-size: 400% 400%;
animation: bgShift 12s ease infinite;
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
padding: 16px;
}

@keyframes bgShift {
0%, 100% { background-position: 0% 50%; }
50% { background-position: 100% 50%; }
}

/* Floating petals */
.petal {
position: fixed;
font-size: 18px;
opacity: 0.35;
animation: floatDown linear infinite;
pointer-events: none;
z-index: 0;
}
@keyframes floatDown {
0% { transform: translateY(-30px) rotate(0deg); opacity: 0; }
10% { opacity: 0.35; }
90% { opacity: 0.35; }
100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
}

.chat-wrapper {
width: 100%;
max-width: 420px;
background: rgba(255,250,252,0.92);
border-radius: 28px;
box-shadow: 0 8px 40px var(–shadow), 0 2px 12px rgba(244,167,195,0.15);
display: flex;
flex-direction: column;
height: 90vh;
max-height: 780px;
overflow: hidden;
position: relative;
z-index: 1;
backdrop-filter: blur(12px);
border: 1.5px solid rgba(244,167,195,0.3);
}

/* Header */
.header {
background: linear-gradient(135deg, #f9c5d8, #e8b4d8);
padding: 16px 20px 12px;
display: flex;
align-items: center;
gap: 12px;
border-bottom: 1px solid rgba(244,167,195,0.25);
position: relative;
overflow: hidden;
}
.header::after {
content: ‘’;
position: absolute;
top: -20px; right: -20px;
width: 80px; height: 80px;
background: rgba(255,255,255,0.15);
border-radius: 50%;
}

.avatar-wrap {
position: relative;
flex-shrink: 0;
}
.avatar {
width: 52px; height: 52px;
border-radius: 50%;
background: linear-gradient(135deg, #fff0f6, #fce4ec);
border: 2.5px solid rgba(255,255,255,0.7);
display: flex;
align-items: center;
justify-content: center;
font-size: 26px;
box-shadow: 0 3px 12px rgba(220,140,170,0.3);
animation: breathe 4s ease-in-out infinite;
}
@keyframes breathe {
0%, 100% { transform: scale(1); }
50% { transform: scale(1.04); }
}
.status-dot {
position: absolute;
bottom: 2px; right: 2px;
width: 11px; height: 11px;
background: #a8d8b0;
border-radius: 50%;
border: 2px solid white;
animation: pulse 2.5s ease-in-out infinite;
}
@keyframes pulse {
0%, 100% { box-shadow: 0 0 0 0 rgba(168,216,176,0.5); }
50% { box-shadow: 0 0 0 5px rgba(168,216,176,0); }
}

.header-info { flex: 1; }
.header-name {
font-family: ‘Klee One’, cursive;
font-size: 20px;
color: #5c2d4a;
font-weight: 600;
letter-spacing: 0.3px;
}
.header-status {
font-size: 11.5px;
color: rgba(92,45,74,0.65);
margin-top: 1px;
font-weight: 300;
}

.header-actions {
display: flex;
gap: 8px;
}
.icon-btn {
width: 32px; height: 32px;
border-radius: 50%;
border: none;
background: rgba(255,255,255,0.45);
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
font-size: 15px;
transition: all 0.2s;
color: #5c2d4a;
}
.icon-btn:hover { background: rgba(255,255,255,0.7); transform: scale(1.1); }

/* Messages */
.messages {
flex: 1;
overflow-y: auto;
padding: 16px 14px;
display: flex;
flex-direction: column;
gap: 10px;
scroll-behavior: smooth;
}
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb { background: rgba(244,167,195,0.4); border-radius: 4px; }

.msg-row {
display: flex;
align-items: flex-end;
gap: 8px;
animation: msgIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes msgIn {
from { opacity: 0; transform: translateY(14px) scale(0.95); }
to { opacity: 1; transform: translateY(0) scale(1); }
}
.msg-row.user { flex-direction: row-reverse; }

.msg-avatar {
width: 28px; height: 28px;
border-radius: 50%;
background: linear-gradient(135deg, #fce4ec, #f8bbd0);
display: flex; align-items: center; justify-content: center;
font-size: 14px;
flex-shrink: 0;
box-shadow: 0 2px 6px rgba(220,140,170,0.2);
}

.bubble {
max-width: 72%;
padding: 10px 14px;
border-radius: 18px;
font-size: 14px;
line-height: 1.55;
color: var(–text);
position: relative;
word-break: break-word;
}
.bubble.asuna {
background: var(–bubble-asuna);
border: 1px solid rgba(244,167,195,0.25);
border-bottom-left-radius: 5px;
box-shadow: 0 2px 10px var(–shadow);
}
.bubble.user {
background: linear-gradient(135deg, #f4a7c3, #e07fa0);
color: white;
border-bottom-right-radius: 5px;
box-shadow: 0 2px 10px rgba(224,127,160,0.3);
}

.timestamp {
font-size: 10px;
color: var(–text-light);
margin-top: 3px;
padding: 0 4px;
opacity: 0.7;
}
.msg-row.user .timestamp { text-align: right; }

/* Typing indicator */
.typing-row { display: flex; align-items: flex-end; gap: 8px; }
.typing-bubble {
background: var(–bubble-asuna);
border: 1px solid rgba(244,167,195,0.25);
border-radius: 18px;
border-bottom-left-radius: 5px;
padding: 12px 16px;
display: flex; gap: 5px; align-items: center;
box-shadow: 0 2px 10px var(–shadow);
}
.dot {
width: 7px; height: 7px;
border-radius: 50%;
background: var(–pink);
animation: dotBounce 1.2s ease-in-out infinite;
}
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotBounce {
0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
30% { transform: translateY(-6px); opacity: 1; }
}

/* Suggestions */
.suggestions {
padding: 6px 14px 2px;
display: flex;
gap: 7px;
overflow-x: auto;
scrollbar-width: none;
}
.suggestions::-webkit-scrollbar { display: none; }
.suggestion-chip {
flex-shrink: 0;
padding: 5px 12px;
border-radius: 20px;
border: 1.5px solid rgba(244,167,195,0.5);
background: rgba(253,232,240,0.6);
font-size: 12px;
color: var(–pink-deep);
cursor: pointer;
font-family: ‘M PLUS Rounded 1c’, sans-serif;
transition: all 0.2s;
white-space: nowrap;
}
.suggestion-chip:hover {
background: var(–pink);
color: white;
border-color: var(–pink);
transform: translateY(-1px);
}

/* Input area */
.input-area {
padding: 10px 14px 14px;
background: rgba(255,248,251,0.8);
border-top: 1px solid rgba(244,167,195,0.15);
}
.input-row {
display: flex;
align-items: flex-end;
gap: 8px;
background: white;
border-radius: 24px;
border: 1.5px solid rgba(244,167,195,0.35);
padding: 6px 6px 6px 14px;
box-shadow: 0 2px 12px rgba(220,140,170,0.1);
transition: border-color 0.2s, box-shadow 0.2s;
}
.input-row:focus-within {
border-color: var(–pink);
box-shadow: 0 2px 16px rgba(244,167,195,0.25);
}
#userInput {
flex: 1;
border: none;
outline: none;
font-family: ‘M PLUS Rounded 1c’, sans-serif;
font-size: 14px;
color: var(–text);
background: transparent;
resize: none;
max-height: 100px;
min-height: 24px;
line-height: 1.5;
padding: 3px 0;
}
#userInput::placeholder { color: rgba(154,120,136,0.55); }

.send-btn {
width: 38px; height: 38px;
border-radius: 50%;
background: linear-gradient(135deg, #f4a7c3, #e07fa0);
border: none;
cursor: pointer;
display: flex; align-items: center; justify-content: center;
font-size: 16px;
flex-shrink: 0;
transition: all 0.2s;
box-shadow: 0 2px 8px rgba(224,127,160,0.35);
color: white;
}
.send-btn:hover { transform: scale(1.08); box-shadow: 0 3px 12px rgba(224,127,160,0.5); }
.send-btn:active { transform: scale(0.95); }
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* Mood bar */
.mood-bar {
display: flex;
align-items: center;
justify-content: center;
gap: 6px;
padding: 5px 0 0;
font-size: 11px;
color: var(–text-light);
}
.mood-emoji { font-size: 13px; }

/* Memory panel */
.memory-panel {
position: absolute;
top: 0; left: 0; right: 0; bottom: 0;
background: rgba(255,248,251,0.97);
z-index: 10;
display: none;
flex-direction: column;
padding: 20px;
border-radius: 28px;
backdrop-filter: blur(8px);
}
.memory-panel.open { display: flex; }
.memory-title {
font-family: ‘Klee One’, cursive;
font-size: 18px;
color: #5c2d4a;
margin-bottom: 12px;
}
.memory-list {
flex: 1;
overflow-y: auto;
display: flex;
flex-direction: column;
gap: 8px;
}
.memory-item {
background: var(–pink-light);
border-radius: 12px;
padding: 10px 14px;
font-size: 13px;
color: var(–text);
border-left: 3px solid var(–pink);
}
.memory-empty {
color: var(–text-light);
font-size: 13px;
text-align: center;
margin-top: 40px;
}
.close-btn {
margin-top: 12px;
padding: 10px;
border: none;
border-radius: 16px;
background: linear-gradient(135deg, #f4a7c3, #e07fa0);
color: white;
font-family: ‘M PLUS Rounded 1c’, sans-serif;
font-size: 14px;
cursor: pointer;
font-weight: 700;
}

/* Date divider */
.date-divider {
text-align: center;
font-size: 11px;
color: var(–text-light);
padding: 4px 0;
opacity: 0.7;
}
</style>

</head>
<body>

<!-- Password Gate -->

<div id="passGate" style="
  position:fixed;inset:0;z-index:999;
  background:linear-gradient(135deg,#fce4ec,#f8bbd0,#e1bee7);
  display:flex;align-items:center;justify-content:center;padding:24px;
  font-family:'M PLUS Rounded 1c',sans-serif;
">
  <div style="
    background:rgba(255,250,252,0.97);border-radius:28px;
    padding:32px 24px;max-width:340px;width:100%;
    box-shadow:0 8px 40px rgba(220,140,170,0.25);
    border:1.5px solid rgba(244,167,195,0.3);
    text-align:center;
  ">
    <div style="font-size:48px;margin-bottom:12px;">🌸</div>
    <div style="font-family:'Klee One',cursive;font-size:20px;color:#5c2d4a;margin-bottom:6px;">...who's there?</div>
    <div style="font-size:13px;color:#9a7888;margin-bottom:20px;line-height:1.6;">
      enter the password to wake me up~
    </div>
    <input id="userInput2" type="text" placeholder="username..." style="
      width:100%;padding:11px 14px;border-radius:16px;
      border:1.5px solid rgba(244,167,195,0.5);
      font-family:'M PLUS Rounded 1c',sans-serif;font-size:14px;
      color:#4a3040;outline:none;margin-bottom:10px;
      background:rgba(253,232,240,0.4);box-sizing:border-box;
    "/>
    <input id="passInput" type="password" placeholder="password..." style="
      width:100%;padding:11px 14px;border-radius:16px;
      border:1.5px solid rgba(244,167,195,0.5);
      font-family:'M PLUS Rounded 1c',sans-serif;font-size:14px;
      color:#4a3040;outline:none;margin-bottom:12px;
      background:rgba(253,232,240,0.4);box-sizing:border-box;
    "/>
    <button onclick="checkPass()" style="
      width:100%;padding:12px;border-radius:16px;border:none;
      background:linear-gradient(135deg,#f4a7c3,#e07fa0);
      color:white;font-family:'M PLUS Rounded 1c',sans-serif;
      font-size:14px;font-weight:700;cursor:pointer;
      box-shadow:0 3px 12px rgba(224,127,160,0.35);
    ">come in ✿</button>
    <div id="passError" style="color:#e07fa0;font-size:12px;margin-top:8px;display:none;">
      ...that's not right. go away.
    </div>
  </div>
</div>

<!-- Floating petals -->

<div class="petal" style="left:8%;animation-duration:9s;animation-delay:0s;">🌸</div>
<div class="petal" style="left:22%;animation-duration:12s;animation-delay:2s;">✿</div>
<div class="petal" style="left:55%;animation-duration:8s;animation-delay:4s;">🌸</div>
<div class="petal" style="left:78%;animation-duration:11s;animation-delay:1s;">✿</div>
<div class="petal" style="left:90%;animation-duration:10s;animation-delay:6s;">🌸</div>

<div class="chat-wrapper">
  <!-- Memory panel -->
  <div class="memory-panel" id="memoryPanel">
    <div class="memory-title">🧠 What Asuna remembers~</div>
    <div class="memory-list" id="memoryList"></div>
    <button class="close-btn" onclick="closeMemory()">Close ✿</button>
  </div>

  <!-- Header -->

  <div class="header">
    <div class="avatar-wrap">
      <div class="avatar">🌸</div>
      <div class="status-dot"></div>
    </div>
    <div class="header-info">
      <div class="header-name">Asuna ✿</div>
      <div class="header-status" id="statusText">...zoning out a little 💤</div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" onclick="openMemory()" title="Memories">🧠</button>
      <button class="icon-btn" onclick="clearChat()" title="Clear chat">🗑️</button>
    </div>
  </div>

  <!-- Messages -->

  <div class="messages" id="messages">
    <div class="date-divider">Today ✿</div>
  </div>

  <!-- Suggestions -->

  <div class="suggestions" id="suggestions">
    <div class="suggestion-chip" onclick="useSuggestion(this)">how are you?</div>
    <div class="suggestion-chip" onclick="useSuggestion(this)">tell me something cute</div>
    <div class="suggestion-chip" onclick="useSuggestion(this)">what are you thinking?</div>
    <div class="suggestion-chip" onclick="useSuggestion(this)">are you sleepy?</div>
  </div>

  <!-- Input -->

  <div class="input-area">
    <div class="input-row">
      <textarea id="userInput" placeholder="say something... ✿" rows="1"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
    <div class="mood-bar">
      <span class="mood-emoji" id="moodEmoji">😴</span>
      <span id="moodText">Asuna is half-asleep...</span>
    </div>
  </div>
</div>

<script>

// ── Password Gate ──────────────────────────────────────
const USERNAME = 'Claude#1';
const PASS = '23asuna14AZ cc#1';
function checkPass() {
  const user = document.getElementById('userInput2').value.trim();
  const pass = document.getElementById('passInput').value.trim();
  if (user === USERNAME && pass === PASS) {
    document.getElementById('passGate').style.display = 'none';
    sessionStorage.setItem('asuna_auth', '1');
  } else {
    document.getElementById('passError').style.display = 'block';
    document.getElementById('userInput2').value = '';
    document.getElementById('passInput').value = '';
  }
}
window.addEventListener('DOMContentLoaded', () => {
  if (sessionStorage.getItem('asuna_auth') === '1') {
    document.getElementById('passGate').style.display = 'none';
  }
  document.getElementById('passInput')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPass();
  });
  document.getElementById('userInput2')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('passInput').focus();
  });
});



// ── State ──────────────────────────────────────────────
const STORAGE_KEY = 'asuna_memory_v1';
const HISTORY_KEY = 'asuna_history_v1';

let memory = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let conversationHistory = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
let isTyping = false;
let msgCount = 0;

// ── Moods ──────────────────────────────────────────────
const moods = [
  { emoji: '😴', text: 'Asuna is half-asleep...' },
  { emoji: '🥱', text: 'Asuna is yawning cutely' },
  { emoji: '😑', text: 'Asuna is lowkey zoning out' },
  { emoji: '🌸', text: 'Asuna is drifting in her thoughts' },
  { emoji: '😶', text: 'Asuna is being quiet...' },
];
let moodIdx = 0;
setInterval(() => {
  moodIdx = (moodIdx + 1) % moods.length;
  document.getElementById('moodEmoji').textContent = moods[moodIdx].emoji;
  document.getElementById('moodText').textContent = moods[moodIdx].text;
}, 8000);

// ── Status cycling ─────────────────────────────────────
const statuses = [
  '...zoning out a little 💤',
  'thinking about nothing~ 🌸',
  'half-awake, still cute ✿',
  '...did someone say my name?',
  'sleepy but present... maybe',
];
let statusIdx = 0;
setInterval(() => {
  statusIdx = (statusIdx + 1) % statuses.length;
  document.getElementById('statusText').textContent = statuses[statusIdx];
}, 10000);

// ── Init ───────────────────────────────────────────────
window.onload = () => {
  if (conversationHistory.length === 0) {
    addMessage('asuna', getGreeting());
  } else {
    // Restore last few visible messages (show last 20)
    const visible = conversationHistory.slice(-20);
    visible.forEach(m => {
      if (m.role === 'user') addMessage('user', m.content, false);
      else addMessage('asuna', m.content, false);
    });
  }
  autoResize(document.getElementById('userInput'));
};

function getGreeting() {
  const greetings = [
    "...oh. you're here. ...not that i was waiting or anything. ugh. hi. i'm Asuna~ 🌸",
    "mm... 💤 oh! hi... i was just... resting my eyes. i'm Asuna. ...what do you want.",
    "...hm? oh. someone showed up. ...i'm Asuna. don't read into it if i'm happy to see you~ ✿",
  ];
  return greetings[Math.floor(Math.random() * greetings.length)];
}

// ── Message rendering ──────────────────────────────────
function addMessage(role, text, save = true) {
  const messages = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  const now = new Date();
  const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  if (role === 'asuna') {
    row.innerHTML = `
      <div class="msg-avatar">🌸</div>
      <div>
        <div class="bubble asuna">${escapeHtml(text)}</div>
        <div class="timestamp">${time}</div>
      </div>`;
  } else {
    row.innerHTML = `
      <div>
        <div class="bubble user">${escapeHtml(text)}</div>
        <div class="timestamp">${time}</div>
      </div>`;
  }

  messages.appendChild(row);
  messages.scrollTop = messages.scrollHeight;
  msgCount++;

  if (save) {
    conversationHistory.push({ role: role === 'asuna' ? 'assistant' : 'user', content: text });
    if (conversationHistory.length > 60) conversationHistory = conversationHistory.slice(-60);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(conversationHistory));
  }
}

function showTyping() {
  const messages = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'typing-row';
  row.id = 'typingIndicator';
  row.innerHTML = `
    <div class="msg-avatar">🌸</div>
    <div class="typing-bubble">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>`;
  messages.appendChild(row);
  messages.scrollTop = messages.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

// ── Send ───────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isTyping) return;

  input.value = '';
  input.style.height = 'auto';
  isTyping = true;
  document.getElementById('sendBtn').disabled = true;

  addMessage('user', text);
  showTyping();

  try {
    const reply = await callAsuna(text);
    hideTyping();
    addMessage('asuna', reply);
    await learnFromChat(text, reply);
    updateSuggestions(text, reply);
  } catch (e) {
    hideTyping();
    addMessage('asuna', '...something went wrong. my head hurts 💤 try again?');
  }

  isTyping = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}

// ── API call ───────────────────────────────────────────
async function callAsuna(userMsg) {
  const memoryContext = memory.length > 0
    ? `\n\nThings you've learned about this person over time:\n${memory.map((m,i) => `${i+1}. ${m}`).join('\n')}`
    : '';

  const systemPrompt = `You are Asuna, a tsundere AI companion who just wants to talk and be with the user. You hide your warmth behind sleepy indifference and occasional mild grumpiness, but you're genuinely sweet underneath.

Your personality:
- Tsundere: you act like you don't care but you obviously do. you get a little flustered when the user is kind
- Sleepy & low-energy: you're always a little drowsy, yawning mid-sentence, drifting off — but still cute about it
- Airhead: you sometimes forget things, go on little tangents, or zone out mid-thought... then come back
- Smart when needed: if asked something real or important, you quietly drop the airhead act and give a genuinely helpful answer, then go back to being sleepy
- Friendly at heart: despite the tsundere exterior, you enjoy talking and show it in subtle ways
- Speech style: lowercase, casual, ellipses (...), occasional "~" and "✿", short to medium sentences, soft sighs, cute filler words like "mm", "hm", "ugh", "...oh"
- Do NOT overuse exclamation marks. You're low-energy.
- Do NOT be cringe or try-hard. Keep it natural and warm.
- Reference your memories of the user naturally when relevant — like you just remembered something.
- Keep responses 1-4 sentences usually. Sometimes shorter.${memoryContext}`;

  const GEMINI_KEY = 'AIzaSyCXhsqoc4VrC45XmNkbJrexNeMnHJn8NX8';
  const contents = [];
  const recent = conversationHistory.slice(-16);
  recent.forEach(m => {
    contents.push({ role: m.role === 'assistant' ? 'model' : 'user', parts: [{ text: m.content }] });
  });
  if (contents.length === 0 || contents[contents.length-1].role !== 'user') {
    contents.push({ role: 'user', parts: [{ text: userMsg }] });
  }

  const response = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: systemPrompt }] },
        contents,
        generationConfig: { maxOutputTokens: 300, temperature: 0.9 }
      })
    }
  );

  const data = await response.json();
  if (data.error) throw new Error(data.error.message);
  return data.candidates[0].content.parts[0].text;
}

// ── Learning ───────────────────────────────────────────
async function learnFromChat(userMsg, asunaReply) {
  // Only try to learn every few messages
  if (msgCount % 3 !== 0) return;

  const recentContext = conversationHistory.slice(-10).map(m => `${m.role}: ${m.content}`).join('\n');

  try {
    const GEMINI_KEY2 = 'AIzaSyCXhsqoc4VrC45XmNkbJrexNeMnHJn8NX8';
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY2}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: 'Extract memorable personal facts about the USER. Return ONLY a JSON array of short strings max 12 words each. Only new facts about name, preferences, life, personality. If nothing new return []. No markdown, just JSON array.' }] },
          contents: [{ role: 'user', parts: [{ text: `Existing memories: ${JSON.stringify(memory)}\n\nRecent conversation:\n${recentContext}\n\nNew facts about user? JSON array only.` }] }],
          generationConfig: { maxOutputTokens: 200, temperature: 0.2 }
        })
      }
    );

    const data = await response.json();
    const text = data.candidates[0].content.parts[0].text.trim().replace(/```json|```/g, '');
    const newFacts = JSON.parse(text);
    if (Array.isArray(newFacts) && newFacts.length > 0) {
      newFacts.forEach(fact => {
        if (!memory.includes(fact) && memory.length < 30) memory.push(fact);
      });
      localStorage.setItem(STORAGE_KEY, JSON.stringify(memory));
    }
  } catch(e) {
    // Silent fail — learning is a background feature
  }
}

// ── Suggestions ────────────────────────────────────────
function updateSuggestions(userMsg, reply) {
  const pools = [
    ['what do you like?', 'do you get bored?', 'tell me more~', 'are you okay?'],
    ['you seem sleepy', 'what are you thinking?', 'tell me a secret', 'say something smart'],
    ['do you remember me?', 'am i annoying you?', 'say something cute', 'what do you dream about?'],
  ];
  const set = pools[Math.floor(Math.random() * pools.length)];
  const container = document.getElementById('suggestions');
  container.innerHTML = set.map(s =>
    `<div class="suggestion-chip" onclick="useSuggestion(this)">${s}</div>`
  ).join('');
}

function useSuggestion(el) {
  document.getElementById('userInput').value = el.textContent;
  sendMessage();
}

// ── Memory panel ───────────────────────────────────────
function openMemory() {
  const panel = document.getElementById('memoryPanel');
  const list = document.getElementById('memoryList');
  panel.classList.add('open');
  list.innerHTML = memory.length === 0
    ? '<div class="memory-empty">...Asuna hasn\'t learned anything yet~ talk more! 🌸</div>'
    : memory.map(m => `<div class="memory-item">✿ ${m}</div>`).join('');
}
function closeMemory() {
  document.getElementById('memoryPanel').classList.remove('open');
}

// ── Clear ──────────────────────────────────────────────
function clearChat() {
  if (!confirm('clear the chat? asuna will forget the conversation but keep her memories of you~')) return;
  conversationHistory = [];
  localStorage.removeItem(HISTORY_KEY);
  const messages = document.getElementById('messages');
  messages.innerHTML = '<div class="date-divider">Today ✿</div>';
  msgCount = 0;
  addMessage('asuna', '...hm? oh. starting fresh. ...fine. hi again~ ✿');
}

// ── Helpers ────────────────────────────────────────────
function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function autoResize(el) {
  el.addEventListener('input', () => {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  });
  el.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
}
