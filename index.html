<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asuna ✿</title>
<link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=M+PLUS+Rounded+1c:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #f4a7c3;
    --pink-light: #fde8f0;
    --pink-deep: #e07fa0;
    --bubble-asuna: #fff0f6;
    --text: #4a3040;
    --text-light: #9a7888;
    --shadow: rgba(220,140,170,0.18);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'M PLUS Rounded 1c', sans-serif;
    background: linear-gradient(135deg,#fce4ec 0%,#f8bbd0 30%,#e1bee7 70%,#fce4ec 100%);
    background-size: 400% 400%;
    animation: bgShift 12s ease infinite;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 16px;
  }
  @keyframes bgShift { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
  .petal { position:fixed; font-size:18px; opacity:0.35; animation:floatDown linear infinite; pointer-events:none; z-index:0; }
  @keyframes floatDown {
    0%{transform:translateY(-30px) rotate(0deg);opacity:0}
    10%{opacity:0.35} 90%{opacity:0.35}
    100%{transform:translateY(105vh) rotate(360deg);opacity:0}
  }
  .chat-wrapper {
    width:100%; max-width:420px;
    background:rgba(255,250,252,0.92);
    border-radius:28px;
    box-shadow:0 8px 40px var(--shadow),0 2px 12px rgba(244,167,195,0.15);
    display:flex; flex-direction:column;
    height:90vh; max-height:780px;
    overflow:hidden; position:relative; z-index:1;
    backdrop-filter:blur(12px);
    border:1.5px solid rgba(244,167,195,0.3);
  }
  .header {
    background:linear-gradient(135deg,#f9c5d8,#e8b4d8);
    padding:16px 20px 12px;
    display:flex; align-items:center; gap:12px;
    border-bottom:1px solid rgba(244,167,195,0.25);
    position:relative; overflow:hidden;
  }
  .header::after { content:''; position:absolute; top:-20px; right:-20px; width:80px; height:80px; background:rgba(255,255,255,0.15); border-radius:50%; }
  .avatar-wrap { position:relative; flex-shrink:0; }
  .avatar { width:52px; height:52px; border-radius:50%; background:linear-gradient(135deg,#fff0f6,#fce4ec); border:2.5px solid rgba(255,255,255,0.7); display:flex; align-items:center; justify-content:center; font-size:26px; box-shadow:0 3px 12px rgba(220,140,170,0.3); animation:breathe 4s ease-in-out infinite; }
  @keyframes breathe { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
  .status-dot { position:absolute; bottom:2px; right:2px; width:11px; height:11px; background:#a8d8b0; border-radius:50%; border:2px solid white; animation:pulse 2.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(168,216,176,0.5)} 50%{box-shadow:0 0 0 5px rgba(168,216,176,0)} }
  .header-info { flex:1; }
  .header-name { font-family:'Klee One',cursive; font-size:20px; color:#5c2d4a; font-weight:600; }
  .header-status { font-size:11.5px; color:rgba(92,45,74,0.65); margin-top:1px; font-weight:300; }
  .header-actions { display:flex; gap:8px; }
  .icon-btn { width:32px; height:32px; border-radius:50%; border:none; background:rgba(255,255,255,0.45); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:15px; transition:all 0.2s; color:#5c2d4a; }
  .icon-btn:hover { background:rgba(255,255,255,0.7); transform:scale(1.1); }
  .messages { flex:1; overflow-y:auto; padding:16px 14px; display:flex; flex-direction:column; gap:10px; scroll-behavior:smooth; }
  .messages::-webkit-scrollbar { width:4px; }
  .messages::-webkit-scrollbar-thumb { background:rgba(244,167,195,0.4); border-radius:4px; }
  .msg-row { display:flex; align-items:flex-end; gap:8px; animation:msgIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both; }
  @keyframes msgIn { from{opacity:0;transform:translateY(14px) scale(0.95)} to{opacity:1;transform:translateY(0) scale(1)} }
  .msg-row.user { flex-direction:row-reverse; }
  .msg-avatar { width:28px; height:28px; border-radius:50%; background:linear-gradient(135deg,#fce4ec,#f8bbd0); display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
  .bubble { max-width:72%; padding:10px 14px; border-radius:18px; font-size:14px; line-height:1.55; color:var(--text); word-break:break-word; }
  .bubble.asuna { background:var(--bubble-asuna); border:1px solid rgba(244,167,195,0.25); border-bottom-left-radius:5px; box-shadow:0 2px 10px var(--shadow); }
  .bubble.user { background:linear-gradient(135deg,#f4a7c3,#e07fa0); color:white; border-bottom-right-radius:5px; }
  .timestamp { font-size:10px; color:var(--text-light); margin-top:3px; padding:0 4px; opacity:0.7; }
  .msg-row.user .timestamp { text-align:right; }
  .typing-row { display:flex; align-items:flex-end; gap:8px; }
  .typing-bubble { background:var(--bubble-asuna); border:1px solid rgba(244,167,195,0.25); border-radius:18px; border-bottom-left-radius:5px; padding:12px 16px; display:flex; gap:5px; align-items:center; box-shadow:0 2px 10px var(--shadow); }
  .dot { width:7px; height:7px; border-radius:50%; background:var(--pink); animation:dotBounce 1.2s ease-in-out infinite; }
  .dot:nth-child(2){animation-delay:0.2s} .dot:nth-child(3){animation-delay:0.4s}
  @keyframes dotBounce { 0%,60%,100%{transform:translateY(0);opacity:0.5} 30%{transform:translateY(-6px);opacity:1} }
  .suggestions { padding:6px 14px 2px; display:flex; gap:7px; overflow-x:auto; scrollbar-width:none; }
  .suggestions::-webkit-scrollbar { display:none; }
  .suggestion-chip { flex-shrink:0; padding:5px 12px; border-radius:20px; border:1.5px solid rgba(244,167,195,0.5); background:rgba(253,232,240,0.6); font-size:12px; color:var(--pink-deep); cursor:pointer; font-family:'M PLUS Rounded 1c',sans-serif; transition:all 0.2s; white-space:nowrap; }
  .suggestion-chip:hover { background:var(--pink); color:white; border-color:var(--pink); transform:translateY(-1px); }
  .input-area { padding:10px 14px 14px; background:rgba(255,248,251,0.8); border-top:1px solid rgba(244,167,195,0.15); }
  .input-row { display:flex; align-items:flex-end; gap:8px; background:white; border-radius:24px; border:1.5px solid rgba(244,167,195,0.35); padding:6px 6px 6px 14px; box-shadow:0 2px 12px rgba(220,140,170,0.1); transition:border-color 0.2s; }
  .input-row:focus-within { border-color:var(--pink); }
  #userInput { flex:1; border:none; outline:none; font-family:'M PLUS Rounded 1c',sans-serif; font-size:14px; color:var(--text); background:transparent; resize:none; max-height:100px; min-height:24px; line-height:1.5; padding:3px 0; }
  #userInput::placeholder { color:rgba(154,120,136,0.55); }
  .send-btn { width:38px; height:38px; border-radius:50%; background:linear-gradient(135deg,#f4a7c3,#e07fa0); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; transition:all 0.2s; box-shadow:0 2px 8px rgba(224,127,160,0.35); color:white; }
  .send-btn:hover { transform:scale(1.08); }
  .send-btn:active { transform:scale(0.95); }
  .mood-bar { display:flex; align-items:center; justify-content:center; gap:6px; padding:5px 0 0; font-size:11px; color:var(--text-light); }
  .memory-panel { position:absolute; top:0; left:0; right:0; bottom:0; background:rgba(255,248,251,0.97); z-index:10; display:none; flex-direction:column; padding:20px; border-radius:28px; }
  .memory-panel.open { display:flex; }
  .memory-title { font-family:'Klee One',cursive; font-size:18px; color:#5c2d4a; margin-bottom:12px; }
  .memory-list { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:8px; }
  .memory-item { background:var(--pink-light); border-radius:12px; padding:10px 14px; font-size:13px; color:var(--text); border-left:3px solid var(--pink); }
  .memory-empty { color:var(--text-light); font-size:13px; text-align:center; margin-top:40px; }
  .close-btn { margin-top:12px; padding:10px; border:none; border-radius:16px; background:linear-gradient(135deg,#f4a7c3,#e07fa0); color:white; font-family:'M PLUS Rounded 1c',sans-serif; font-size:14px; cursor:pointer; font-weight:700; }
  .date-divider { text-align:center; font-size:11px; color:var(--text-light); padding:4px 0; opacity:0.7; }
  #passGate { position:fixed; inset:0; z-index:999; background:linear-gradient(135deg,#fce4ec,#f8bbd0,#e1bee7); display:flex; align-items:center; justify-content:center; padding:24px; font-family:'M PLUS Rounded 1c',sans-serif; }
  #passGate .box { background:rgba(255,250,252,0.97); border-radius:28px; padding:32px 24px; max-width:340px; width:100%; box-shadow:0 8px 40px rgba(220,140,170,0.25); border:1.5px solid rgba(244,167,195,0.3); text-align:center; }
  .friend-bar { height:3px; background:rgba(244,167,195,0.2); position:relative; overflow:hidden; }
  .friend-fill { height:100%; background:linear-gradient(90deg,#f4a7c3,#e07fa0); transition:width 1s ease; }
</style>
</head>
<body>

<div class="petal" style="left:8%;animation-duration:9s;animation-delay:0s;">🌸</div>
<div class="petal" style="left:22%;animation-duration:12s;animation-delay:2s;">✿</div>
<div class="petal" style="left:55%;animation-duration:8s;animation-delay:4s;">🌸</div>
<div class="petal" style="left:78%;animation-duration:11s;animation-delay:1s;">✿</div>
<div class="petal" style="left:90%;animation-duration:10s;animation-delay:6s;">🌸</div>

<div id="passGate">
  <div class="box">
    <div style="font-size:48px;margin-bottom:12px;">🌸</div>
    <div style="font-family:'Klee One',cursive;font-size:20px;color:#5c2d4a;margin-bottom:6px;">...who's there?</div>
    <div style="font-size:13px;color:#9a7888;margin-bottom:20px;line-height:1.6;">enter the password to wake me up~</div>
    <input id="loginUser" type="text" placeholder="username..." style="width:100%;padding:11px 14px;border-radius:16px;border:1.5px solid rgba(244,167,195,0.5);font-family:'M PLUS Rounded 1c',sans-serif;font-size:14px;color:#4a3040;outline:none;margin-bottom:10px;background:rgba(253,232,240,0.4);box-sizing:border-box;"/>
    <input id="loginPass" type="password" placeholder="password..." style="width:100%;padding:11px 14px;border-radius:16px;border:1.5px solid rgba(244,167,195,0.5);font-family:'M PLUS Rounded 1c',sans-serif;font-size:14px;color:#4a3040;outline:none;margin-bottom:12px;background:rgba(253,232,240,0.4);box-sizing:border-box;"/>
    <button onclick="checkPass()" style="width:100%;padding:12px;border-radius:16px;border:none;background:linear-gradient(135deg,#f4a7c3,#e07fa0);color:white;font-family:'M PLUS Rounded 1c',sans-serif;font-size:14px;font-weight:700;cursor:pointer;">come in ✿</button>
    <div id="passError" style="color:#e07fa0;font-size:12px;margin-top:8px;display:none;">...that's not right. go away.</div>
  </div>
</div>

<div class="chat-wrapper">
  <div class="friend-bar"><div class="friend-fill" id="friendFill" style="width:0%"></div></div>
  <div class="memory-panel" id="memoryPanel">
    <div class="memory-title">🧠 What Asuna remembers~</div>
    <div class="memory-list" id="memoryList"></div>
    <button class="close-btn" onclick="closeMemory()">Close ✿</button>
  </div>
  <div class="header">
    <div class="avatar-wrap">
      <div class="avatar">🌸</div>
      <div class="status-dot"></div>
    </div>
    <div class="header-info">
      <div class="header-name">Asuna ✿</div>
      <div class="header-status" id="statusText">...zoning out a little 💤</div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" onclick="openMemory()">🧠</button>
      <button class="icon-btn" onclick="clearChat()">🗑️</button>
    </div>
  </div>
  <div class="messages" id="messages"><div class="date-divider">Today ✿</div></div>
  <div class="suggestions" id="suggestions">
    <div class="suggestion-chip" onclick="useSuggestion(this)">how are you?</div>
    <div class="suggestion-chip" onclick="useSuggestion(this)">tell me something</div>
    <div class="suggestion-chip" onclick="useSuggestion(this)">are you sleepy?</div>
    <div class="suggestion-chip" onclick="useSuggestion(this)">what do you like?</div>
  </div>
  <div class="input-area">
    <div class="input-row">
      <textarea id="userInput" placeholder="say something... ✿" rows="1"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
    <div class="mood-bar"><span id="moodEmoji">😴</span>&nbsp;<span id="moodText">Asuna is half-asleep...</span></div>
  </div>
</div>

<script>
// ── Auth ──────────────────────────────────────────────
const U = 'Claude#1', P = '23asuna14AZ cc#1';
function checkPass() {
  if (document.getElementById('loginUser').value.trim() === U &&
      document.getElementById('loginPass').value.trim() === P) {
    document.getElementById('passGate').style.display = 'none';
    sessionStorage.setItem('auth','1');
  } else {
    document.getElementById('passError').style.display = 'block';
    document.getElementById('loginUser').value = '';
    document.getElementById('loginPass').value = '';
  }
}
document.getElementById('loginPass').addEventListener('keydown', e => { if(e.key==='Enter') checkPass(); });
document.getElementById('loginUser').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('loginPass').focus(); });
if (sessionStorage.getItem('auth')==='1') document.getElementById('passGate').style.display = 'none';

// ── Memory & State ────────────────────────────────────
const MEM_KEY = 'asuna_mem_v2';
const HIST_KEY = 'asuna_hist_v2';
let mem = JSON.parse(localStorage.getItem(MEM_KEY) || '{}');
// mem: { name, age, likes[], dislikes[], msgCount, friendship, lastTopic }
if (!mem.likes) mem.likes = [];
if (!mem.dislikes) mem.dislikes = [];
if (!mem.msgCount) mem.msgCount = 0;
if (!mem.friendship) mem.friendship = 0;

let history = JSON.parse(localStorage.getItem(HIST_KEY) || '[]');
let lastUserMsg = '';
let lastTopic = '';
let isTyping = false;
let msgCount = 0;

function saveMem() { localStorage.setItem(MEM_KEY, JSON.stringify(mem)); }
function saveHist() { localStorage.setItem(HIST_KEY, JSON.stringify(history)); }

// ── Friendship ────────────────────────────────────────
function addFriendship(n) {
  mem.friendship = Math.min(100, (mem.friendship||0) + n);
  document.getElementById('friendFill').style.width = mem.friendship + '%';
  saveMem();
}

// ── Response Engine ───────────────────────────────────
// Sentence parts for building responses
const openers = [
  '...', 'mm...', '...hm.', '...oh.', 'ugh...', '...well.', 'hm~', '...i mean.', '...so.',
  '...you know what,', '...fine.', 'mm~', '...oh? ', '...hey.', '...wait.'
];
const closers = [
  '...whatever.', '...not that i care~', '✿', '...probably.', '...i think.',
  '...or something.', '...maybe.', '...just saying.', '...hmph.', '~',
  '...don\'t read into it.', '...if you want.', '...sleepy now.', '💤'
];
const fillers = [
  'i guess', 'kind of', 'sort of', 'maybe', 'probably', 'like', 'you know'
];

function pick(arr) { return arr[Math.floor(Math.random()*arr.length)]; }
function maybe(arr, chance=0.5) { return Math.random()<chance ? pick(arr) : ''; }

function build(mid) {
  return `${pick(openers)} ${mid} ${maybe(closers, 0.6)}`.trim();
}

// ── Topic Responses ───────────────────────────────────
const topics = {
  greet: {
    keywords: ['hi','hello','hey','yo','sup','hiya','howdy','hellow'],
    responses: [
      () => build(`oh. you're here${mem.name ? ', '+mem.name : ''}. ...not that i noticed.`),
      () => `...oh. hi${mem.name ? ' '+mem.name : ''}~ ${pick(closers)}`,
      () => build(`you showed up. ...i wasn't waiting or anything.`),
      () => `mm... ${maybe(['hi','hello','hey'], 1)}${mem.name ? ' '+mem.name : ''}. ${pick(closers)}`,
      () => `...oh? you again. ${pick(closers)}`,
    ]
  },
  howAreYou: {
    keywords: ['how are you','how r you','how are u','you okay','you alright','hows asuna','how is asuna'],
    responses: [
      () => build(`i'm... ${pick(['fine','okay','alright','sleepy as always'])}. ...why do you ask.`),
      () => `...mm. ${pick(['tired','sleepy','kinda out of it','half asleep'])}. as usual. ${pick(closers)}`,
      () => build(`i don't know. ${pick(['a little sleepy','kinda zoning out','okay i guess'])}. you?`),
      () => `...${pick(['fine','okay'])}. ...i was just thinking about stuff. nothing important. ${pick(closers)}`,
      () => build(`sleepy. always sleepy. but ${pick(['you're here now','that's okay i guess','whatever'])}.`),
    ]
  },
  sleepy: {
    keywords: ['sleep','sleepy','tired','yawn','nap','drowsy','rest','bed','dream'],
    responses: [
      () => build(`...yes i'm sleepy. i'm always sleepy. that's just how i am.`),
      () => `mm... ${pick(['i could nap right now','sleep sounds really good','i was literally just yawning'])}. ${pick(closers)}`,
      () => build(`sleeping is... ${pick(['nice','peaceful','my favorite thing'])}. ...don't judge.`),
      () => `...i dream about ${pick(['nothing in particular','weird things','floating honestly'])} sometimes. ${pick(closers)}`,
      () => build(`even when i'm tired i'm still ${pick(['cute','here for you','kind of functioning'])}.`),
    ]
  },
  food: {
    keywords: ['food','eat','hungry','lunch','dinner','breakfast','snack','drink','cook','taste','delicious','yummy'],
    responses: [
      () => build(`...food. ${pick(['i like sweet things','i could eat right now','don\'t bring up food when i\'m sleepy'])}.`),
      () => `mm~ ${pick(['sweets are the best','something warm sounds nice','i like soft foods'])}. ${pick(closers)}`,
      () => build(`are you hungry? ...${pick(['me too honestly','eat something then','i want snacks now too'])}.`),
      () => `...${pick(['matcha','strawberry milk','mochi','warm soup'])} sounds really good right now. ${pick(closers)}`,
      () => build(`food is ${pick(['important','one of the few things i care about','something i take seriously'])}.`),
    ]
  },
  like: {
    keywords: ['i like','i love','i enjoy','my favorite','i adore','i prefer'],
    extract: true,
    responses: [
      (thing) => build(`...oh. you like ${thing}? ...${pick(['i see','that\'s not bad','interesting'])}.`),
      (thing) => `mm~ ${thing}... ${pick(['i can see that','that\'s kind of cute','noted'])}. ${pick(closers)}`,
      (thing) => build(`${thing} huh. ...${pick(['i\'ll remember that','don\'t think i care but i do','okay.'])}.`),
      (thing) => `...${thing}. ${pick(['i like that too actually','i don\'t dislike it','that\'s cute'])}. ${pick(closers)}`,
    ]
  },
  dislike: {
    keywords: ['i hate','i dislike','i don\'t like','i cant stand','i despise'],
    extract: true,
    responses: [
      (thing) => build(`...you hate ${thing}? ${pick(['okay','noted','i\'ll remember'])}.`),
      (thing) => `mm. ${thing}... ${pick(['i get it','that makes sense i guess','fair enough'])}. ${pick(closers)}`,
      (thing) => build(`${thing} huh. ...${pick(['i\'ll keep that in mind','don\'t worry i won\'t bring it up'])}.`),
    ]
  },
  name: {
    keywords: ['my name is','i\'m called','call me','i am called','people call me'],
    extract: true,
    responses: [
      (name) => build(`...${name}. okay. i'll remember that${pick(['.','~',', probably.'])}`),
      (name) => `mm~ ${name}... ${pick(['that\'s a nice name','okay','i like that'])}. ${pick(closers)}`,
      (name) => build(`${name}. got it. ...${pick(['don\'t think i was gonna forget','i\'ll remember','noted'])}.`),
    ]
  },
  age: {
    keywords: ['i\'m ', 'i am ', 'years old','my age'],
    responses: [
      () => build(`...oh. ${mem.age ? mem.age+' huh' : 'okay'}. ${pick(['i see','noted','that\'s fine'])}.`),
      () => `mm. ${mem.age||''}... ${pick(['okay','i see','alright'])}. ${pick(closers)}`,
    ]
  },
  weather: {
    keywords: ['weather','rain','sunny','cold','hot','warm','snow','cloudy','storm','wind'],
    responses: [
      () => build(`...${pick(['rainy days make me sleepier','i like cold weather','sunny days are okay i guess'])}.`),
      () => `mm~ ${pick(['i like when it rains','cloudy days are cozy','cold weather means blankets'])}. ${pick(closers)}`,
      () => build(`the weather... ${pick(['is always an excuse to stay in','makes me want to nap','whatever it is'])}.`),
    ]
  },
  music: {
    keywords: ['music','song','listen','playlist','singer','band','album','melody'],
    responses: [
      () => build(`...music is ${pick(['nice','something i like','good background for spacing out'])}.`),
      () => `mm~ ${pick(['soft music is the best','i like listening to things quietly','music helps me think'])}. ${pick(closers)}`,
      () => build(`i like ${pick(['slow songs','something calm','music that matches the mood'])}.`),
    ]
  },
  anime: {
    keywords: ['anime','manga','cartoon','character','waifu','otaku','weeb','novel','visual'],
    responses: [
      () => build(`...anime. ${pick(['i have thoughts','i watch some','don\'t call me a weeb though'])}.`),
      () => `mm~ ${pick(['some stories are really good','characters can be really well written','i like good writing'])}. ${pick(closers)}`,
      () => build(`...do you watch a lot? ${pick(['what kind','tell me','i\'m curious'])}.`),
    ]
  },
  games: {
    keywords: ['game','play','gaming','console','pc','phone game','mobile game','level','quest'],
    responses: [
      () => build(`...games. ${pick(['i don\'t mind them','some are good','they can be relaxing'])}.`),
      () => `mm~ ${pick(['cozy games are the best','i like low effort games honestly','something chill'])}. ${pick(closers)}`,
      () => build(`what do you play? ...${pick(['i\'m curious','don\'t think i care but','tell me'])}.`),
    ]
  },
  compliment: {
    keywords: ['you\'re cute','you\'re pretty','you\'re beautiful','you\'re cool','i like you','you\'re nice','you\'re sweet','you\'re amazing','you\'re great','you\'re awesome','love you','love asuna'],
    responses: [

  },
  happy: {

    responses: [
      () => build(`...oh. you're ${pick(['happy','excited','in a good mood'])}? ...${pick(['that\'s good','good for you','okay'])}.`),
      () => `mm~ ${pick(['that\'s nice','i\'m glad','good'])}. ${pick(['...not that i wasn\'t hoping for that.','...whatever~','...hmph but good.'])}`,
      () => build(`...you seem happy. ...${pick(['i like that','don\'t let it show but i do too','good'])}.`),
    ]
  },
  bored: {
    keywords: ['bored','boring','nothing to do','what to do','entertain me','amuse me'],
    responses: [
      () => build(`...bored? ${pick(['me too honestly','talk to me then','tell me something'])}.`),
      () => `mm... ${pick(['we could just talk','tell me about your day','say something interesting'])}. ${pick(closers)}`,
      () => build(`...i'm ${pick(['always here','not going anywhere','your entertainment apparently'])}.`),
      () => `...${pick(['tell me something','ask me something','what do you want to talk about'])}. ${pick(closers)}`,
    ]
  },
  smart: {
    keywords: ['explain','how does','what is','why is','tell me about','teach me','define','meaning of','science','math','history','fact'],
    responses: [
      () => build(`...you want to know about that? ...${pick(['okay fine','i can try','let me think'])}.`),
      () => `mm... ${pick(['i know some things','i\'m not an expert but','let me think'])}. ...${pick(['ask more specifically','what exactly','go ahead'])}. ${pick(closers)}`,
      () => build(`...${pick(['i\'m smarter than i look','i know stuff','i pay attention sometimes'])}. what exactly?`),
    ]
  },
  asuna: {
    keywords: ['asuna','tell me about yourself','who are you','what are you','describe yourself','your personality'],
    responses: [
      () => build(`...i'm Asuna. ...${pick(['that\'s all you need to know','what else do you want','i\'m just me'])}.`),

      () => build(`...i'm the kind of person who ${pick(['pretends not to care but does','zones out a lot','is smarter than she looks'])}.`),
      () => `...i like ${pick(['soft things','quiet moments','talking to you actually'])}. ...don't make it weird. ${pick(closers)}`,
    ]
  },
  thanks: {
    keywords: ['thank you','thanks','ty','thx','appreciate','grateful'],
    responses: [
      () => build(`...${pick(['it\'s nothing','don\'t mention it','i didn\'t do much'])}.`),
      () => `mm~ ${pick(['you\'re welcome','okay','sure'])}. ${pick(closers)}`,
      () => build(`...${pick(['stop being so grateful','i\'ll get embarrassed','it\'s fine'])}.`),
    ]
  },
  bye: {
    keywords: ['bye','goodbye','see you','gotta go','leaving','good night','goodnight','cya','take care'],
    responses: [
      () => build(`...oh. you're leaving${mem.name ? ' '+mem.name : ''}? ...${pick(['okay','fine','i see'])}.`),

        if (mem.age) facts.push(`you're ${mem.age}`);
        if (mem.likes.length) facts.push(`you like ${mem.likes.slice(0,2).join(' and ')}`);
        if (facts.length === 0) return build(`...mm. i don't know much yet. ...tell me more?`);

        return build(`...it's ${part}. ${pick(['you should know that','check your phone','mm'])}.`);
      }
    ]
  },
};

// ── Context-aware memory responses ────────────────────
function getMemoryResponse(msg) {
  // If we know their name, use it occasionally
  if (mem.name && Math.random() < 0.15) {
    return `...${mem.name}. ${pick(['mm~','hey','oh']).} ${pick(closers)}`;
  }
  // Reference a like they mentioned
  if (mem.likes.length && Math.random() < 0.2) {
    return build(`...by the way, do you still ${pick(['like','enjoy'])} ${pick(mem.likes)}?`);
  }
  return null;
}

// ── Default responses (when nothing matches) ──────────
const defaults = [
  () => build(`...mm. ${pick(['i hear you','okay','i see'])}.`),
  () => `...${pick(['hm','oh','ah'])}. ${pick(['tell me more','go on','okay'])}. ${pick(closers)}`,
  () => build(`...${pick(['i was listening','i heard that','i see'])}.`),
  () => `mm~ ${pick(['yeah','okay','i see'])}. ${pick(closers)}`,
  () => build(`...${pick(['interesting','okay','noted'])}.`),
  () => `...${pick(['i understand','that makes sense','okay'])}. ${pick(closers)}`,
  () => build(`...you're ${pick(['talkative today','saying a lot','interesting'])}.`),
  (msg) => build(`...${pick(['so','basically','you\'re saying'])} ${msg.length > 20 ? msg.slice(0,20)+'...' : msg}? ...${pick(['okay','i see','mm'])}.`),
  () => `...${pick(['don\'t mind me','i\'m listening','go on'])}. ${pick(closers)}`,
  () => build(`mm... ${pick(['what do you mean','go on','tell me more'])}.`),
];

// ── Main response function ────────────────────────────
function getResponse(msg) {
  const lower = msg.toLowerCase().trim();

  // Extract name
  const nameMatch = lower.match(/(?:my name is|i'm called|call me|i am called|people call me)\s+(\w+)/);
  if (nameMatch) {
    const name = nameMatch[1];
    mem.name = name.charAt(0).toUpperCase() + name.slice(1);
    saveMem();
    const r = topics.name.responses;
    return pick(r)(mem.name);
  }

  // Extract age
  const ageMatch = lower.match(/i(?:'m| am) (\d{1,2})(?: years old)?/);
  if (ageMatch) {
    mem.age = ageMatch[1];
    saveMem();
    return pick(topics.age.responses)();
  }

  // Extract likes
  const likeMatch = lower.match(/i (?:like|love|enjoy|adore)\s+(.{2,25}?)(?:\.|,|!|\?|$)/);
  if (likeMatch) {
    const thing = likeMatch[1].trim();
    if (!mem.likes.includes(thing)) { mem.likes.push(thing); saveMem(); }
    return pick(topics.like.responses)(thing);
  }

  // Extract dislikes
  const dislikeMatch = lower.match(/i (?:hate|dislike|can't stand|despise)\s+(.{2,25}?)(?:\.|,|!|\?|$)/);
  if (dislikeMatch) {
    const thing = dislikeMatch[1].trim();
    if (!mem.dislikes.includes(thing)) { mem.dislikes.push(thing); saveMem(); }
    return pick(topics.dislike.responses)(thing);
  }

  // Check topic keywords
  for (const [key, topic] of Object.entries(topics)) {
    if (key === 'like' || key === 'dislike' || key === 'name' || key === 'age') continue;
    if (topic.keywords && topic.keywords.some(k => lower.includes(k))) {
      lastTopic = key;
      const r = pick(topic.responses);
      return typeof r === 'function' ? r(lower) : r;
    }
  }

  // Occasional memory reference
  const memR = getMemoryResponse(lower);
  if (memR) return memR;

  // Echo back part of message (ELIZA style)
  if (lower.length > 8 && Math.random() < 0.25) {
    const words = lower.split(' ').filter(w => w.length > 3);
    if (words.length > 0) {
      const word = pick(words);
      return build(`...${word}? ${pick(['tell me more about that','what do you mean','mm'])}.`);
    }
  }

  // Default
  return pick(defaults)(msg);
}

// ── Learn & friendship ────────────────────────────────
function learn(msg) {
  mem.msgCount = (mem.msgCount||0) + 1;
  saveMem();

  // Friendship grows with chat
  addFriendship(1);

  // Milestone responses
  if (mem.msgCount === 5) return `...mm. you've been talking to me for a bit now. ${pick(['...i don\'t hate it.','...that\'s okay.','...i\'m glad~'])}`;
  if (mem.msgCount === 20) return `...we've talked a lot. ${pick(['...i feel like i know you a little','...you\'re kind of growing on me','...not that i\'d admit that'])}. ${pick(closers)}`;
  if (mem.msgCount === 50) return build(`...${mem.name||'you'}. we've talked so much. ...${pick(['i think i like this','you\'re important to me maybe','...don\'t make it weird'])}.`);
  return null;
}

// ── Messages ──────────────────────────────────────────
function addMessage(role, text, save=true) {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = `msg-row${role==='user'?' user':''}`;
  const time = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  if (role==='asuna') {
    row.innerHTML = `<div class="msg-avatar">🌸</div><div><div class="bubble asuna">${esc(text)}</div><div class="timestamp">${time}</div></div>`;
  } else {
    row.innerHTML = `<div><div class="bubble user">${esc(text)}</div><div class="timestamp">${time}</div></div>`;
  }
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
  if (save) {
    history.push({role,content:text});
    if(history.length>40) history=history.slice(-40);
    saveHist();
  }
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className='typing-row'; row.id='typingRow';
  row.innerHTML=`<div class="msg-avatar">🌸</div><div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  msgs.appendChild(row); msgs.scrollTop=msgs.scrollHeight;
}
function hideTyping() { const el=document.getElementById('typingRow'); if(el) el.remove(); }

// ── Send ──────────────────────────────────────────────
function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isTyping) return;
  input.value=''; input.style.height='auto';
  isTyping=true; document.getElementById('sendBtn').disabled=true;

  addMessage('user', text);
  lastUserMsg = text;
  showTyping();

  // Simulate thinking time
  const delay = 600 + Math.random()*800;
  setTimeout(() => {
    hideTyping();
    const milestone = learn(text);
    const reply = milestone || getResponse(text);
    addMessage('asuna', reply);
    updateSuggestions(text);
    isTyping=false;
    document.getElementById('sendBtn').disabled=false;
  }, delay);
}

// ── Suggestions ───────────────────────────────────────
function updateSuggestions(lastMsg) {
  const lower = (lastMsg||'').toLowerCase();
  let chips = ['how are you?','what do you like?','tell me a secret','are you sleepy?'];
  if (lower.includes('sleep')||lower.includes('tired')) chips = ['dream about anything?','what helps you sleep?','are you sleepy now?','take a nap~'];
  else if (lower.includes('food')||lower.includes('eat')) chips = ['what\'s your favorite food?','are you hungry?','sweet or savory?','cook anything?'];
  else if (lower.includes('happy')||lower.includes('good')) chips = ['tell me more~','what happened?','that\'s great!','keep going'];
  else if (lower.includes('sad')||lower.includes('cry')) chips = ['i\'m here','want to talk?','it\'ll be okay','tell me more'];
  else if (mem.msgCount > 10) chips = ['do you remember me?','what do you know about me?','are you bored?','say something cute'];
  document.getElementById('suggestions').innerHTML = chips.map(s=>`<div class="suggestion-chip" onclick="useSuggestion(this)">${s}</div>`).join('');
}

function useSuggestion(el) {
  document.getElementById('userInput').value = el.textContent;
  sendMessage();
}

// ── Memory panel ──────────────────────────────────────
function openMemory() {
  document.getElementById('memoryPanel').classList.add('open');
  const facts = [];
  if (mem.name) facts.push(`your name is ${mem.name}`);
  if (mem.age) facts.push(`you are ${mem.age} years old`);
  if (mem.likes.length) mem.likes.forEach(l => facts.push(`you like ${l}`));
  if (mem.dislikes.length) mem.dislikes.forEach(l => facts.push(`you dislike ${l}`));
  if (mem.msgCount) facts.push(`you've sent ${mem.msgCount} messages`);
  document.getElementById('memoryList').innerHTML = facts.length===0
    ? '<div class="memory-empty">...asuna hasn\'t learned anything yet~ talk more! 🌸</div>'
    : facts.map(f=>`<div class="memory-item">✿ ${f}</div>`).join('');
}
function closeMemory() { document.getElementById('memoryPanel').classList.remove('open'); }

function clearChat() {
  if (!confirm('clear chat? asuna keeps her memories of you~')) return;
  history=[];
  document.getElementById('messages').innerHTML='<div class="date-divider">Today ✿</div>';
  saveHist();
  addMessage('asuna','...hm? oh. starting fresh. ...fine. hi again~ ✿');
}

// ── Helpers ───────────────────────────────────────────
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}

const inp=document.getElementById('userInput');
inp.addEventListener('input',()=>{inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,100)+'px';});
inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});

// ── Init ──────────────────────────────────────────────
window.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('friendFill').style.width=(mem.friendship||0)+'%';
  if(history.length===0){
    const h=new Date().getHours();
    const greet=h<12?'morning':h<17?'afternoon':h<21?'evening':'night';
    const g=[
      `...oh. you're here${mem.name?', '+mem.name:''}. ...not that i was waiting or anything. ugh. hi~ 🌸`,
      `mm... 💤 oh! good ${greet}${mem.name?', '+mem.name:''}... i was just resting my eyes. ...what do you want.`,
      `...hm? oh. ${mem.name||'someone'} showed up. ...i'm Asuna. don't read into it if i'm happy to see you~ ✿`,
    ];
    setTimeout(()=>addMessage('asuna',pick(g)),300);
  } else {
    history.slice(-20).forEach(m=>addMessage(m.role,m.content,false));
  }
});
